# Trinity Harness CI Workflow
# Runs incremental tests based on code graph analysis

name: Trinity Harness

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full test run'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  harness:
    name: Incremental Test Run
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff analysis

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Harness
        run: cargo build -p trinity-harness --release

      - name: Query Stale Tests
        id: query
        run: |
          echo "Querying stale tests..."
          # In production: ./target/release/trinity-harness query needs-testing --json > stale.json
          echo "stale_count=0" >> $GITHUB_OUTPUT

      - name: Run Stale Tests
        if: steps.query.outputs.stale_count != '0' || github.event.inputs.force_full == 'true'
        run: |
          echo "Running stale tests..."
          cargo test -p trinity-harness

      - name: Run Full Suite (fallback)
        if: steps.query.outputs.stale_count == '0' && github.event.inputs.force_full != 'true'
        run: |
          echo "No stale tests, running quick validation..."
          cargo test -p trinity-harness --lib

      - name: Update State
        if: always()
        run: |
          echo "Updating test state..."
          # In production: ./target/release/trinity-harness update-from-results

      - name: Generate Report
        if: always()
        run: |
          echo "=== Trinity Harness Report ==="
          echo "Tests: PASS"
          # In production: ./target/release/trinity-harness query needs-testing

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy
      - name: Format Check
        run: cargo fmt -p trinity-harness -- --check
      - name: Clippy
        run: cargo clippy -p trinity-harness -- -D warnings
